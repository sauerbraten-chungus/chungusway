syntax = "proto3";
package chungusdb;

service ChungusDBService {
  rpc SendMatchStats(MatchStats) returns(MatchStatsResponse);
}

message MatchStats {
  // string = chungID
  map<string, Stats> player_stats = 1;
}

message MatchStatsResponse {
  string message = 1;
}

message Stats {
  string name = 1;
  int32 frags = 2;
  int32 deaths = 3;
  float accuracy = 4;
  int32 elo = 5;
}
