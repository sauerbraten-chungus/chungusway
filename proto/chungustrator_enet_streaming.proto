syntax = "proto3";
package chungustrator_enet;

service VerificationCodeService {
  // Original unary RPC (keep for backward compatibility)
  rpc SendVerificationCodes(VerificationCodeRequest) returns (VerificationCodeResponse);

  // New bidirectional streaming RPC
  rpc StreamEvents(stream OrchestratorMessage) returns (stream ServerMessage);
}

// ============================================================================
// Unary RPC messages (existing)
// ============================================================================

message VerificationCodeRequest {
  map<string, string> codes = 1;
}

message VerificationCodeResponse {
  string msg = 1;
}

// ============================================================================
// Streaming RPC messages (new)
// ============================================================================

// Messages sent FROM orchestrator TO server
message OrchestratorMessage {
  oneof payload {
    VerificationCodes verification_codes = 1;
    Ping ping = 2;  // Optional: keepalive
  }
}

message VerificationCodes {
  map<string, string> codes = 1;
}

message Ping {
  int64 timestamp = 1;
}

// Messages sent FROM server TO orchestrator
message ServerMessage {
  oneof payload {
    Acknowledgment ack = 1;
    GameServerShutdown shutdown = 2;
    Pong pong = 3;  // Optional: keepalive response
  }
}

message Acknowledgment {
  string msg = 1;
  int32 codes_received = 2;  // Number of verification codes received
}

message GameServerShutdown {
  string server_address = 1;  // e.g., "127.0.0.1:28785"
  int64 timestamp = 2;         // Unix timestamp of shutdown
  string reason = 3;           // Optional: why it shut down
}

message Pong {
  int64 timestamp = 1;
}
